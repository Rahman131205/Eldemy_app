<ion-content [fullscreen]="true" style="--background: transparent;">
  <div class="background-container"></div>
  <div class="page-wrapper">
    <div class="spacer"></div>

    <div class="bottom-overlay">
      <div class="brand-section">
        <h1 class="logo-text">eldemy</h1>
        <p class="tagline">Berdayakan perjalanan belajarmu</p>
      </div>

      <div class="features-row">
        <div class="feature-badge">
          <div class="badge-icon-wrapper icon-cyan">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
              <path d="M256 368C334.16 368 432 325.65 432 256S334.16 144 256 144 80 186.35 80 256s102.2 112 176 112z"/>
              <path d="M256 368v80"/>
              <path d="M176 448h160"/>
              <path d="M80 256l-48-16"/>
              <path d="M480 256l-48 16"/>
              <path d="M256 144V48l80 48-80 48"/>
            </svg>
          </div>
          <span class="badge-text">Kursus<br />Terbaik</span>
        </div>
        <div class="feature-badge">
          <div class="badge-icon-wrapper icon-orange">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 512 512" fill="none" stroke="currentColor" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="352 144 464 144 464 256"/>
              <path d="M48 368L169.37 246.63a32 32 0 0145.26 0l50.74 50.74a32 32 0 0045.26 0L464 144"/>
            </svg>
          </div>
          <span class="badge-text">Pantau<br />Progres</span>
        </div>
      </div>

      <button class="btn-get-started" (click)="goToRegister()">
        Mulai Sekarang
        <span class="arrow-icon">→</span>
      </button>

      <div class="login-link">
        <span class="muted-text">SUDAH PUNYA AKUN?</span>
        <span class="link-text" (click)="goToLogin()">MASUK</span>
      </div>
    </div>
  </div>
</ion-content>
